# core/validator.py rule set
rules:
  - id: energy_bounds
    description: "Recommended action must keep SoC in [0, max] over the next 5 laps."
    check: simulate_action_forward(action, current_soc, max_soc) -> all values in [0, max]
    on_fail: regenerate

  - id: harvest_cap
    description: "Recommended action must not exceed the per-lap harvest cap."
    check: action.implied_harvest_mj <= verified_cap_mj
    on_fail: regenerate
    pre_g4_behavior: noop  # verified_cap_mj is loaded from RegulationSource at G-4
                           # before G-4 the rule passes (no cap to check against)

  - id: citation_existence
    description: "regulation_citation.passage must appear verbatim in retrieved chunks."
    check: citation.passage in retrieved_chunks_text
    on_fail: regenerate

  - id: language_safety
    description: "No prescriptive language."
    check: no match for ['you must', 'optimal', 'always', 'definitely will']
    on_fail: regenerate

  - id: source_consistency
    description: "regulation_citation.source must match a chunk's source field."
    check: citation.source in [chunk.source for chunk in retrieved_chunks]
    on_fail: regenerate

ui_display:
  badge: "Validation"
  pass_color: "#00C853"
  fail_color: "#FF4500"
  show_failed_rules: true