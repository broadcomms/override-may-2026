# OVERRIDE — Compose V2 stack (v6 plan task 3.1, architecture per ADR-002)
#
# Four services, three profiles, one shared volume. Modes:
#
#   podman compose up                                # Mode 1: OVERRIDE alone
#     → only the override service. Fast (~10 s boot). Fixture-driven demo.
#       The demo video uses this mode against fixture-mode UI; the live
#       hosted demo URL is fronted by a Cloudflare Tunnel from the local
#       WSL host (override.patrickndille.com → localhost:8000). See
#       docs/07-deployment.md for the deployment posture. (The original
#       v6 §3.7 Hetzner CX32 VM plan was replaced post-pre-flight.)
#
#   podman compose --profile torcs up                # Mode 2: + live TORCS
#     → override + torcs. The torcs service is the IBM SkillsBuild lab
#       container; first-time pull is ~10 GB and 10–15 min (acceptable per
#       v6 locked decision). Once cached, subsequent runs are fast.
#       Telemetry written by gym_torcs's torcs_jm_par.py to /home/student/
#       workspace/gym_torcs/telemetry/ inside torcs maps via the shared
#       torcs-telemetry volume to /app/data/telemetry/ inside override —
#       reachable via POST /api/sessions/torcs-live for live ingest.
#
#   podman compose --profile observability up        # Mode 3: + Jaeger
#     → override + jaeger. Set OVERRIDE_TRACING=otlp in .env to wire OTel
#       export to http://jaeger:4317. Trace UI at :16686.
#
#   podman compose --profile langflow up             # Mode 4: + Langflow canvas
#     → override + langflow. Visual design layer at :7860, custom components
#       in langflow/override_components/ pre-loaded. First-time build of the
#       langflow image is ~3–5 min (langflow base + OVERRIDE deps); subsequent
#       starts are fast. Pure documentation surface — does NOT replace the
#       FastAPI runtime. See langflow/README.md and docs/04-langflow-canvas.md.
#
# Profiles MUST be listed combinable: `podman compose --profile torcs
# --profile observability --profile langflow up` brings the whole stack —
# useful for the T-24h clean-machine walkthrough.
#
# No top-level `version:` key (gotcha #6 — deprecated in Compose V2).

services:
  # ───────────────────────────────────────────────────────────────────────
  # override — API + built UI bundle (always-on, default profile)
  # ───────────────────────────────────────────────────────────────────────
  override:
    build:
      context: .
      dockerfile: Dockerfile
    image: override:local
    container_name: override
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # When OVERRIDE_LLM_RUNTIME=ollama, route chat to the TORCS container's
      # bundled Ollama via service-DNS on override-net. Default in .env
      # stays watsonx; this is just the routing override for compose.
      OVERRIDE_OLLAMA_BASE_URL: http://torcs:11434
      # OTLP target when OVERRIDE_TRACING=otlp; resolves to the jaeger
      # service only when the observability profile is up.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      # Phase 2 control plane — only resolves when --profile torcs is up.
      # The override proxy endpoints fail gracefully (503) with a "control
      # daemon unreachable" message when the torcs service isn't running,
      # so the default profile remains unaffected.
      TORCS_CONTROL_URL: http://torcs:7000
      TORCS_CONTROL_SECRET: ${TORCS_CONTROL_SECRET:-}
    volumes:
      # Session persistence — survives container restarts.
      - ./data/sessions:/app/data/sessions:Z
      # Shared TORCS-telemetry bus — POST /api/sessions/torcs-live reads
      # JSONL from this directory inside the override container; gym_torcs
      # writes to it from inside the torcs container.
      - torcs-telemetry:/app/data/telemetry:Z
    networks:
      - override-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────
  # torcs — IBM SkillsBuild lab container (profile: torcs)
  # ───────────────────────────────────────────────────────────────────────
  # Note: image is large (~10 GB). Profile-gating means the default
  # `podman compose up` does NOT pull it. README documents the trade-off.
  torcs:
    image: docker.io/johnsloe/torcs-competition:amd64
    container_name: torcs
    profiles: [torcs]
    # The init script absorbs two root-only fixes from RESULTS.md:
    #   chown -R student:student /opt/ollama   (Ollama bundled-but-broken)
    #   echo DONT_PROMPT_WSL_INSTALL=1 >> /etc/environment
    # The image's default USER is `student` (UID 1000 typically) which
    # can't perform either — RESULTS.md documents the manual `podman exec
    # -u root` workaround. We invoke the entrypoint as root so the chown
    # + echo succeed; start.sh inherits root and runs ollama/Xvfb/VNC as
    # root, which works fine (the lab's documented workaround model).
    user: "0:0"
    # WSL2 GPU passthrough — bind /dev/dxg into the container so Mesa can
    # load d3d12_dri.so and route OpenGL through Direct3D 12 to the Windows
    # host GPU. Without this, the container has no GPU device and Mesa
    # falls back to llvmpipe software rasterization, which produces the
    # "white bars where menu text should be" artifact under TORCS's
    # fixed-function GL path (seen 2026-05-13).
    #
    # Local-only convenience: this only matters on the WSL2 host that
    # records the demo video / runs the local-dev TORCS profile.
    # - On a non-WSL2 host (real Linux server, cloud VM) /dev/dxg does
    #   not exist and `podman compose --profile torcs up` will fail to
    #   start the service. The public-facing Cloudflare-fronted demo
    #   does NOT enable --profile torcs, so this binding never matters
    #   for the hosted path. If you ever stand up TORCS on a real Linux
    #   GPU host, swap `/dev/dxg` for `/dev/dri` and drop the WSL volume
    #   mounts below.
    devices:
      - /dev/dxg:/dev/dxg
    environment:
      # Phase 2 control daemon — when present, init script switches into
      # control-daemon mode (backgrounds start.sh, waits for noVNC, then
      # launches uvicorn on :7000 INSIDE the container). The override
      # service uses this same secret to authenticate proxied calls.
      # ADR-004 documents why this is shared-secret over the override-net
      # rather than mTLS or Podman-socket-based control.
      TORCS_CONTROL_SECRET: ${TORCS_CONTROL_SECRET:-}
      # Kiosk desktop surface — when "1", the init script suppresses XFCE
      # panels, hides desktop file icons, applies a branded backdrop, and
      # auto-launches TORCS on session start. Leave at "0" (default) for
      # the normal full desktop with the manual launcher icon.
      OVERRIDE_KIOSK_MODE: ${OVERRIDE_KIOSK_MODE:-0}
      # WSL2 GPU passthrough — tells Mesa where the WSL-provided GL stack
      # lives (libd3d12.so + libDXCore etc.). Inert on non-WSL2 hosts
      # because /usr/lib/wsl/lib won't be bind-mounted there.
      LD_LIBRARY_PATH: /usr/lib/wsl/lib
      # WSL2 audio passthrough — point OpenAL (TORCS's audio backend per
      # ~/.torcs/config/sound.xml `state=openal`) at WSLg's PulseAudio
      # socket. The /mnt/wslg volume below brings the socket into the
      # container; without this env var, OpenAL probes localhost:4713
      # (default Pulse TCP port), finds nothing, and silently disables
      # audio. The unix:... scheme is mandatory — Pulse won't parse a
      # bare path. Same WSL-only caveat as the GPU bindings: on a real
      # Linux host with hardware audio, set this to your host's
      # /run/user/<uid>/pulse/native socket instead, or drop the var
      # entirely and let OpenAL auto-detect ALSA.
      PULSE_SERVER: unix:/mnt/wslg/PulseServer
    ports:
      - "5900:5900"        # VNC (drive via dedicated VNC client)
      - "6080:6080"        # noVNC web (drive in a browser at /vnc.html)
      - "3001:3001/udp"    # SCR — gym_torcs ↔ TORCS server channel
      - "11434:11434"      # Ollama HTTP API (granite4:350m bundled)
      # NOTE: port 7000 (control daemon) is INTENTIONALLY NOT mapped to
      # the host. The daemon is reachable from the override service via
      # http://torcs:7000 over override-net, but never from the host
      # operator's localhost. Per ADR-004 §security — exposing it would
      # mean a host port serving an authenticated control plane with
      # no transport security, defeating the compose-network isolation.
    volumes:
      # gym_torcs source — committed under RaceYourCode/ in the repo root.
      # control_daemon.py also lives here; mounted into the image so the
      # init script can `python3 -m uvicorn control_daemon:app ...`.
      # ":Z" relabels for SELinux (no-op on Ubuntu/WSL); see gotcha #7.
      - ./RaceYourCode:/home/student/workspace:Z
      # Telemetry shared bus — see override service for the other end.
      - torcs-telemetry:/home/student/workspace/gym_torcs/telemetry:Z
      # The lab image ships with two known bugs (Ollama directory ownership
      # + VS Code extension install hang); scripts/torcs_container_init.sh
      # absorbs both at boot. Mounted read-only. Phase 2: the same script
      # also handles the daemon boot chain (start.sh background → wait for
      # noVNC → pip install fastapi/uvicorn → exec uvicorn).
      - ./scripts/torcs_container_init.sh:/usr/local/bin/torcs_init.sh:Z,ro
      # WSL2 GPU passthrough — mounts the Windows-host-provided WSL GL
      # stack so Mesa's d3d12_dri.so can find its driver shims. Companion
      # to the /dev/dxg device above; same WSL-only caveat applies.
      # /mnt/wslg is optional but pulls in WSLg's PulseAudio + GUI sockets
      # if the user later wants audio in TORCS too. Read-only is safe —
      # the container never writes to these paths.
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - /mnt/wslg:/mnt/wslg
      # OVERRIDE brand assets — mounted read-only for kiosk backdrop.
      # When OVERRIDE_KIOSK_MODE=1 and this path exists inside the
      # container, the init script uses logo-on-dark.png as the desktop
      # wallpaper. Safe to mount even when kiosk mode is off (read-only,
      # and the init script only reads it when the flag is set).
      - ./assets/brand:/opt/override-brand:ro,Z
    # Entrypoint override chains to the image's real Cmd
    # (/usr/local/bin/start.sh — pinned via `podman inspect` per
    # the prior plan-file lifecycle artifact). When TORCS_CONTROL_SECRET
    # is set the script takes a different exit path: it backgrounds
    # start.sh and execs uvicorn instead (see scripts/torcs_container_init.sh).
    entrypoint: ["/bin/bash", "/usr/local/bin/torcs_init.sh"]
    healthcheck:
      # /health is unauthenticated by design — used by compose to confirm
      # the control daemon is reachable. Failed healthcheck doesn't kill
      # the container (start.sh is still running in the background and
      # serves noVNC at :6080); it just surfaces in `podman compose ps`.
      test: ["CMD-SHELL", "curl -fsS http://localhost:7000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s    # noVNC wait + pip install can be slow first run
    networks:
      - override-net

  # ───────────────────────────────────────────────────────────────────────
  # jaeger — OpenTelemetry trace collector + UI (profile: observability)
  # ───────────────────────────────────────────────────────────────────────
  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    container_name: jaeger
    profiles: [observability]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"      # Jaeger UI — http://localhost:16686
      - "4317:4317"        # OTLP gRPC (what override exports to)
      - "4318:4318"        # OTLP HTTP
    networks:
      - override-net

  # ───────────────────────────────────────────────────────────────────────
  # langflow — design/demo canvas (profile: langflow)
  # ───────────────────────────────────────────────────────────────────────
  # Mirrors the production pipeline as a visual graph. Custom components in
  # langflow/override_components/ are thin shims over the same core/ modules
  # the FastAPI runtime uses — so there's no second pipeline, just a second
  # entry point. Bind-mounting the code dirs keeps component edits live
  # without rebuilding this image. Reads watsonx credentials from .env.
  #
  # See langflow/README.md §2 (compose mode) for assembly + screenshot steps,
  # and Dockerfile.langflow for the dependency-layering rationale.
  langflow:
    build:
      context: .
      dockerfile: Dockerfile.langflow
    image: override-langflow:local
    container_name: langflow
    profiles: [langflow]
    restart: unless-stopped
    ports:
      - "7860:7860"        # Langflow UI — http://localhost:7860
    env_file: .env
    environment:
      PYTHONPATH: /workspace
      LANGFLOW_COMPONENTS_PATH: /workspace/langflow/override_components
    volumes:
      # OVERRIDE business logic — read-only; same code as the FastAPI runtime.
      # Component imports (from core.*, ingest.*, analysis.*) resolve via
      # PYTHONPATH=/workspace.
      - ./core:/workspace/core:ro,Z
      - ./ingest:/workspace/ingest:ro,Z
      - ./analysis:/workspace/analysis:ro,Z
      - ./guardian:/workspace/guardian:ro,Z
      - ./prompts:/workspace/prompts:ro,Z
      - ./langflow:/workspace/langflow:ro,Z
      - ./models.json:/workspace/models.json:ro,Z
      # Regulation chunks (Docling output / sample fallback). Read-only;
      # langflow's Reg Retriever component loads from here.
      - ./data/regs:/workspace/data/regs:ro,Z
      # Sample sessions for the demo flow's File Input node.
      - ./data/sessions:/workspace/data/sessions:ro,Z
      # Persist Langflow's own state (saved flows, user prefs) across restarts.
      - langflow-data:/app/.langflow:Z
    networks:
      - override-net

# Shared bus for the live-ingest path. Named volume (managed by Podman)
# rather than a bind mount so file ownership / SELinux context is uniform
# across both writer (torcs) and reader (override) services regardless
# of the host's user-namespace mapping.
volumes:
  torcs-telemetry:
  # Langflow's own state directory (saved flows, prefs). Named so it
  # survives `podman compose down` without `-v`; cleared explicitly via
  # `podman volume rm overdrive-may-2026_langflow-data` if needed.
  langflow-data:

networks:
  override-net:
